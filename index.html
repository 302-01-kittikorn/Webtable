<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการข้อมูลแบบตาราง</title>
    
    <!-- ดึง CSS ของ Tabulator มาใช้เพื่อความสวยงาม -->
    <link href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .toolbar {
            margin-bottom: 15px;
        }
        button {
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 5px;
        }
        button:hover {
            background-color: #0b5ed7;
        }
        button.btn-danger {
            background-color: #dc3545;
        }
        button.btn-danger:hover {
            background-color: #bb2d3b;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 ระบบจัดการข้อมูลแบบตาราง</h2>
    
    <!-- ปุ่มควบคุม -->
    <div class="toolbar">
        <button id="add-row">➕ เพิ่มแถวใหม่</button>
        <button id="del-row" class="btn-danger">🗑️ ลบแถวที่เลือก</button>
    </div>

    <!-- ส่วนที่จะแสดงตาราง -->
    <div id="data-table"></div>
</div>

<script>
    // 1. กำหนดข้อมูลเริ่มต้น (Sample Data)
    var tableData = [
        {id:1, name:"สมชาย ใจดี", age:28, role:"ผู้จัดการ", progress:100},
        {id:2, name:"สมหญิง รักเรียน", age:23, role:"นักพัฒนาเว็บ", progress:40},
        {id:3, name:"สมศักดิ์ ขยันงาน", age:35, role:"นักการตลาด", progress:80},
    ];

    // 2. สร้างตาราง Tabulator
    var table = new Tabulator("#data-table", {
        data: tableData,           // ใส่ข้อมูลเริ่มต้น
        layout: "fitColumns",      // ปรับขนาดคอลัมน์ให้พอดีหน้าจออัตโนมัติ
        reactiveData: true,        // เปิดระบบ Sync ข้อมูลอัตโนมัติเมื่อมีการแก้ไข
        selectable: 1,             // เลือกแถวได้ทีละ 1 แถวเพื่อกดลบ
        columns: [                 // กำหนดหัวข้อคอลัมน์
            {formatter:"rownum", width:40, hozAlign:"center"}, // ลำดับตัวเลขอัตโนมัติ
            {title:"ชื่อ-นามสกุล", field:"name", editor:"input"}, // editor:"input" แปลว่ากดพิมพ์แก้ไขในตารางได้เลย
            {title:"อายุ", field:"age", editor:"number", hozAlign:"left", width:100},
            {title:"ตำแหน่ง", field:"role", editor:"input"},
            {title:"ความคืบหน้า (%)", field:"progress", editor:"number", formatter:"progress", formatterParams:{color:["#dc3545", "#ffc107", "#198754"]}},
        ],
    });

    // 3. ฟังก์ชันปุ่ม "เพิ่มแถวใหม่"
    document.getElementById("add-row").addEventListener("click", function(){
        table.addRow({name:"ดับเบิ้ลคลิกเพื่อแก้ชื่อ", age:20, role:"ระบุตำแหน่ง", progress:0});
    });

    // 4. ฟังก์ชันปุ่ม "ลบแถวที่เลือก"
    document.getElementById("del-row").addEventListener("click", function(){
        var selectedRows = table.getSelectedRows();
        if(selectedRows.length > 0) {
            selectedRows[0].delete();
        } else {
            alert("กรุณาคลิกเลือกแถวในตารางที่ต้องการลบก่อนครับ");
        }
    });
</script>

</body>
</html>
